<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080" role="img" aria-labelledby="title desc">
  <title id="title">Studio Gradient Background</title>
  <desc id="desc">Neutral approved gradient backdrop for non-brand-critical scenes.</desc>
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#312E81" />
      <stop offset="45%" stop-color="#1E1B4B" />
      <stop offset="100%" stop-color="#020617" />
    </radialGradient>
  </defs>
  <rect width="1920" height="1080" fill="url(#bg)" />
</svg>
